<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dinner Tonight — your daily dinner, decided">
  <defs>
    <linearGradient id="hsBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6a3d"/>
      <stop offset="0.5" stop-color="#ff8a4f"/>
      <stop offset="1" stop-color="#f2a33c"/>
    </linearGradient>
    <radialGradient id="hsGlow" cx="0.82" cy="0.18" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="hsBowlClipOg"><circle cx="905" cy="322" r="176"/></clipPath>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" rx="0" fill="url(#hsBg)"/>
  <rect width="1200" height="630" fill="url(#hsGlow)"/>
  <circle cx="150" cy="120" r="22" fill="#ffffff" opacity="0.28"/>
  <circle cx="120" cy="520" r="14" fill="#ffffff" opacity="0.22"/>
  <circle cx="1090" cy="90" r="40" fill="#ffe08a" opacity="0.85"/>

  <!-- left text block -->
  <g font-family="'Poppins',system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
    <!-- eyebrow pill -->
    <rect x="90" y="150" width="322" height="52" rx="26" fill="#ffffff" opacity="0.2"/>
    <text x="118" y="185" font-size="22" font-weight="700" letter-spacing="3" fill="#ffffff">A NEW DINNER EVERY DAY</text>

    <!-- wordmark / headline -->
    <text x="88" y="308" font-size="92" font-weight="800" letter-spacing="-2" fill="#ffffff">Dinner</text>
    <text x="88" y="410" font-size="92" font-weight="800" letter-spacing="-2" fill="#fff3ec">Tonight</text>

    <!-- tagline -->
    <text x="92" y="480" font-size="30" font-weight="500" fill="#ffffff" opacity="0.96">Your daily dinner, decided —</text>
    <text x="92" y="522" font-size="30" font-weight="700" fill="#ffffff">550+ free recipes</text>
  </g>

  <!-- right: flat food illustration -->
  <g>
    <!-- plate shadow -->
    <ellipse cx="905" cy="500" rx="196" ry="34" fill="#c8471f" opacity="0.25"/>
    <!-- bowl -->
    <circle cx="905" cy="322" r="200" fill="#ffffff"/>
    <circle cx="905" cy="322" r="200" fill="none" stroke="#ffd9c9" stroke-width="12"/>
    <circle cx="905" cy="322" r="178" fill="#fff3ec"/>

    <g clip-path="url(#hsBowlClipOg)">
      <!-- grain base -->
      <path d="M729 346 Q905 416 1081 346 L1081 520 L729 520 Z" fill="#f2a33c"/>
      <circle cx="800" cy="366" r="8" fill="#f7bd6a"/>
      <circle cx="866" cy="380" r="8" fill="#f7bd6a"/>
      <circle cx="936" cy="372" r="8" fill="#f7bd6a"/>
      <circle cx="1004" cy="380" r="8" fill="#f7bd6a"/>
      <circle cx="838" cy="398" r="7" fill="#f7bd6a"/>
      <circle cx="972" cy="400" r="7" fill="#f7bd6a"/>

      <!-- leafy greens -->
      <path d="M772 296 Q738 240 800 230 Q826 274 802 312 Q788 312 772 296 Z" fill="#27b277"/>
      <path d="M800 230 Q826 274 802 312" fill="none" stroke="#1e935f" stroke-width="6" stroke-linecap="round"/>
      <path d="M828 314 Q796 250 862 242 Q884 288 856 326 Q840 326 828 314 Z" fill="#33c184"/>
      <path d="M862 242 Q884 288 856 326" fill="none" stroke="#1e935f" stroke-width="6" stroke-linecap="round"/>

      <!-- tomatoes -->
      <circle cx="1000" cy="286" r="36" fill="#ff6a3d"/>
      <ellipse cx="989" cy="276" rx="10" ry="7" fill="#ff9a78" opacity="0.85"/>
      <path d="M1000 250 l-8 -16 M1000 250 l8 -16 M1000 250 l0 -20" stroke="#27b277" stroke-width="6" stroke-linecap="round"/>
      <circle cx="1046" cy="336" r="24" fill="#ff6a3d"/>
      <ellipse cx="1038" cy="328" rx="7" ry="5" fill="#ff9a78" opacity="0.85"/>

      <!-- fried egg -->
      <ellipse cx="890" cy="360" rx="62" ry="46" fill="#ffffff"/>
      <circle cx="890" cy="358" r="26" fill="#f2a33c"/>
      <circle cx="881" cy="349" r="9" fill="#f7c26f" opacity="0.9"/>

      <!-- avocado -->
      <path d="M932 372 q46 -14 70 22 q-40 30 -78 10 q-10 -22 8 -32 Z" fill="#33c184"/>
      <path d="M948 374 q30 -6 46 16 q-28 16 -52 6 q-4 -14 6 -22 Z" fill="#d7f2a8"/>
    </g>

    <!-- steam -->
    <path d="M858 150 q18 -28 0 -56 q-18 -28 0 -56" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity="0.6"/>
    <path d="M912 150 q18 -28 0 -56 q-18 -28 0 -56" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
    <path d="M966 150 q18 -28 0 -56 q-18 -28 0 -56" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>
